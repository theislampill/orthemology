# Machine-readable source-status registry (Decision 0013, rescoped by the R4
# independent review).
#
# SCOPE (honest, machine-declared below in `covered_claim_families`): this registry is
# AUTHORITATIVE FOR THE SELECTED CLAIM FAMILIES IT COVERS - the R4 concrete/ideal-reason
# attribution chain, the El-Tobgui records, the enumerated Athari per-claim rows, the
# sequential latent-variable related work, and this project's own formal extension.
# It is NOT a registry of every load-bearing claim in the corpus: the broader per-claim
# sourcing surface is docs/sourcing/SOURCING-LEDGER.md and the companion ledgers, which
# carry more rows than this file does. The earlier "authoritative for every load-bearing
# claim" wording overstated the coverage and is withdrawn; see the Decision 0013 amendment.
#
# WHAT THE VALIDATOR ESTABLISHES: scripts/validate_source_status.py runs offline and checks
# RECORD SHAPE and INTERNAL AGREEMENT of the frozen records - required fields, vocabulary,
# status/evidence-access consistency, scope-family membership, and prose agreement. It does
# NOT verify that a source is true, that a quotation was read, or that a DOI resolves; no
# check here is evidence about the world.
schema: orthemology-source-status-v2
verified: 2026-07-20
covered_claim_families:
  concrete_ideal_reason_chain:
    prefix: CIR
    description: the modern concrete-reason / ideal-reason attribution chain (Doko & Turner 2023; Evans 1998; Turner 2022/2023)
  el_tobgui_records:
    prefix: ELT
    description: El-Tobgui's dissertation, article, and monograph as three distinct works
  athari_per_claim:
    prefix: ATH
    description: the enumerated Athari companion claims that replaced the R3 blanket disclaimer
  latent_related_work:
    prefix: LAT
    description: the bounded sequential latent-variable related work (Decision 0015)
  project_extension:
    prefix: EXT
    description: this project's own formal extension, for which no external source is claimed
not_covered:
  description: >-
    Every other load-bearing claim in the corpus - the manuscript's related-work concessions,
    the empirical-program metric claims, the epistemology parallels, the Qur'anic loci registry
    (which has its own validator and file), and the companion's philosophical apparatus. Those
    are tracked in docs/sourcing/SOURCING-LEDGER.md, companion/sourcing/COMPANION-SOURCING-LEDGER.md,
    and references/quran-loci.yaml. Absence from this registry is NOT a claim that a source is
    unverified; it means this registry does not adjudicate it.
status_vocabulary:
  PRIMARY_TEXT_EXACT: the exact wording was directly checked in the primary text or an authoritative rendering of it
  PRIMARY_WORK_THEME: the work exists, attribution is confirmed, and the cited theme is confirmed; exact wording not directly checked
  PRIMARY_LOCUS_EDITION_DEPENDENT: work and theme confirmed; the cited page/volume is edition-dependent and was not independently opened
  SECONDARY_VERIFIED: a reputable secondary source is confirmed at publisher/official level and supports the claim
  SECONDARY_RECONSTRUCTION: the claim is a modern scholarly reconstruction; not asserted as the classical author's own formulation
  COMPILATION_MEDIATED: read only through the supplied compilation; not confirmed against the publisher's version
  INFERENCE_CROSS_SOURCE: the claim is this project's synthesis across sources, not any single source's statement
  ORTHEMOLOGICAL_EXTENSION: this project's own formal extension; no external source is claimed
  UNVERIFIED_REMOVE_OR_DOWNSCOPE: could not be verified; must be removed or made non-load-bearing
claims:

