# Canonical machine-readable experiment-packet state (Decision 0018).
# One row per packet; scripts/validate_experiment_readiness.py enforces:
# closed vocabularies, freeze-hash agreement, transition prerequisites,
# the no-run guard, and agreement with each packet's own STATUS.yaml.
# A Git freeze is NOT an external preregistration; nothing below may say
# "preregistered" without naming a real registry record.
schema: orthemology-experiment-status-v1
readiness_vocabulary: [DRAFT, SPEC_COMPLETE, DETERMINISTICALLY_VALIDATED, READY_FOR_HUMAN_MATCHING_REVIEW, READY_TO_RUN, RUN_IN_PROGRESS, RUN_COMPLETE_UNADJUDICATED, ADJUDICATED]
registration_vocabulary: [NOT_REGISTERED, PREREGISTRATION_READY, LOCALLY_PROTOCOL_FROZEN, EXTERNALLY_PREREGISTERED]
packets:
# --- Current benchmark packets (R7, Decision 0020/0022) ---
- packet_id: FCSP-2
  path: experiments/false-closure-selective-prediction-v2/
  purpose: false-closure / selective-prediction benchmark v2 (manuscript 13.1) — machinery incremental value against a matched baseline; supersedes FCSP-1
  supersedes: FCSP-1
  readiness_state: READY_TO_RUN
  registration_state: PREREGISTRATION_READY
  freeze_hash: 18b6a302dc673ba869e9e63c509129d1b80e5edc5e20f6a9d7edb6e2533601cc
  methods_gate: passed (Decision 0022; scripts/validate_experiment_methods.py)
  required_remaining_gates: [owner execution authorization and spend, external preregistration (owner/external act)]
  run_exists: false
  licensed: nothing — no result, no adoption, no empirical claim
- packet_id: ER-2
  path: experiments/episode-reification-v2/
  purpose: episode-reification incremental-value test v2 (manuscript 13.2) — explicit episode/verdict record vs matched ordinary audit record; supersedes ER-1
  supersedes: ER-1
  readiness_state: READY_TO_RUN
  registration_state: PREREGISTRATION_READY
  freeze_hash: 7c1336eea26c4696b70fc1978e3c5e90c5cf5ff2b3eea9b60ccf635022ab9726
  methods_gate: passed (Decision 0022; scripts/validate_experiment_methods.py)
  required_remaining_gates: [owner execution authorization and spend, external preregistration (owner/external act)]
  run_exists: false
  licensed: nothing — no result, no adoption, no empirical claim
# --- Historical R6 packet versions (Decision 0020: methods-unready, preserved byte-frozen) ---
- packet_id: FCSP-1
  path: experiments/false-closure-selective-prediction/
  purpose: false-closure benchmark v1 (R6) — HISTORICAL; methodologically unready (no harness/parser, incomplete analysis, leaky stimuli); superseded by FCSP-2
