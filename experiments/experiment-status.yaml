  superseded_by: FCSP-2
  correction_note: >-
    R6 classified this READY_TO_RUN; the R6 audit + R7 pass reproduced its methods defects
    (Decision 0020). Its status here is corrected to DETERMINISTICALLY_VALIDATED — the highest
    its evidence ever justified. The packet directory and freeze hash are preserved byte-for-byte;
    its own STATUS.yaml records what R6 claimed, as history.
  readiness_state: DETERMINISTICALLY_VALIDATED
  registration_state: PREREGISTRATION_READY
  freeze_hash: 59c5427b2551a1446e10e5aadb24ed2fcb749e7d072335ff14fe1dfec939737b
  required_remaining_gates: [superseded — do not run; see FCSP-2]
  run_exists: false
  licensed: nothing
- packet_id: ER-1
  path: experiments/episode-reification/
  purpose: episode-reification test v1 (R6) — HISTORICAL; methodologically unready (E1 scoring bug, label leakage, incomplete analysis); superseded by ER-2
  historical: true
  superseded_by: ER-2
  correction_note: >-
    R6 classified this READY_TO_RUN; the R6 audit + R7 pass reproduced its methods defects
    (Decision 0020), including a live-probed E1 completion-scoring bug and treatment-label leakage.
    Corrected to DETERMINISTICALLY_VALIDATED; directory and freeze hash preserved byte-for-byte.
  readiness_state: DETERMINISTICALLY_VALIDATED
  registration_state: PREREGISTRATION_READY
  freeze_hash: fd3194406f42afa8602c0a704b088154c498100c1aff4b81d1d1c9da80a9fc78
  required_remaining_gates: [superseded — do not run; see ER-2]
