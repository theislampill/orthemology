# degree. scripts/validate_memetic_ecology.py checks that each dependence
# structure yields the expected warrant conclusion (rule: any common_source or
# copying_dependence => NOT tawatur-like-independence). Establishes no epistemic
# warrant from number, popularity, or institutional prevalence.
