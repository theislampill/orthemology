# --- sequential latent-variable related work (Decision 0015; bounded related-work scope only) ---
- id: LAT-1
  locus: docs/related-work/LATENT-STATE-INFERENCE-AND-ORTHEMOLOGY.md; docs/decisions/0015-latent-state-observation-and-representation-boundary.md; manuscript section 12.1
  claim_level: related-work report about a published study's reported findings
  claim: >-
    a published sequential-learning study reports that several compared models can reach the
    endpoint while only one compared model matched the reported longitudinal trajectory, and that
    high task performance can occur without the global representation geometry the study measured
  source: >-
    Sun, Weinan et al., "Learning produces an orthogonalized state machine in the hippocampus",
    Nature 640(8057):165-175, 2025
  source_type: secondary scholarship (primary research article in another field)
  doi: 10.1038/s41586-024-08548-w
  locus_exact: article as published (open access, CC BY 4.0; PMC11964937)
  status: SECONDARY_VERIFIED
  verification_date: 2026-07-20
  wording_directly_checked: false
  page_edition_dependent: false
  school_flag: none (systems neuroscience)
  support: >-
    supports ONLY the bounded abstract claim that endpoint performance and endpoint representation
    do not by themselves determine the learning trajectory or mechanism. Does not identify latent
    states with orthemes; does not validate orthemology; supplies no etymological support for
    "ortheme"; bears nothing on fitrah, metaphysical orthability, Necessary Being, or divine Speech
  notes: >-
    Bibliographic record officially verified via Crossref in the R4 pass. The R4 independent review
    did NOT re-open or reproduce the underlying experimental procedures - out of scope by the
    controlling instruction; the repository claim is a bounded report of the source's own reported
    findings, and the trajectory-match claim is scoped AMONG THE COMPARED MODELS UNDER THE REPORTED
    EVALUATION, never universally.
