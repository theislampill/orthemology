  tolerated_ambiguity: mixed-domain tasks may overlap with another applicable claimant
  fallback_claimants: [baseline-reasoning]
  no_claim_allowed: true
  decision_policy: applicable when a data-model operation is present
  indeterminate_policy: retain the attempt and defer or route through another applicable claimant
  fixture_suite: examples/somnus/activation-contract-fixtures.yaml
  effective: {from_revision: task4-fixture-v1, through_revision: null}
