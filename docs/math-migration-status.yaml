schema: orthemology-math-migration-status-v1
# R7B, Decision 0023. The mathematical-typesetting pipeline
# (scripts/latex_to_typst_math.py; canonical GitHub-compatible $...$ / ```math
# source; rendered by the pinned typst package) is PROVEN end-to-end on
# docs/notation-gallery.md -> artifacts/notation-gallery.pdf (zero notdef).
#
# The four publication corpus documents are NOT yet migrated in place. Their
# known missing-glyph (notdef/NUL) counts are pinned below so the reproduced
# defect (R7B-PDF-MATH-BASELINE.md) is TRACKED: scripts/validate_pdf_math.py
# fails if a PDF's notdef count differs from the value here, so the defect can
# neither silently grow nor be silently declared fixed. When a document is
# migrated, set migrated: true and expected_notdef: 0 in the same commit that
# migrates its source. Full corpus migration is the reviewed continuation (a
# fresh-Fable-reviewed pass), made safe by these validators. A Git freeze is
# not a migration.
pipeline:
  implemented: "P1 — in-repo LaTeX-subset -> Typst-math translator; zero new dependencies; keeps the deterministic typst-package build and byte-reproducibility"
  recommended_target: "P2 — pinned Pandoc -> Typst writer. R7C settled the choice by EVIDENCE (docs/project-closure/r7c/MATH-PIPELINE-PARITY-AUDIT.md): pandoc 3.6.4 IS provisionable (sha256 a9e5feb3...; refutes R7B's premise, audit B4), but P1 beat it on the corpus (36/36 vs 34/36 zero-notdef) and adds no CI dependency. P1 retained; P2 recorded as a proven portability alternative (canonical $...$ source is pipeline-agnostic)."
  decision: docs/decisions/0023-mathematical-source-and-typesetting-pipeline.md
  r7c_migration_infrastructure:
    inventory: "docs/math-source-inventory.yaml — every FORMULA-bearing backtick span (218 across 29 files) classified; validate_math_source.py FAILS on any formula-in-backtick not recorded here (defeats tamper probe 1, audit B5)"
    tool: "scripts/unicode_math_to_latex.py — the migration engine; PROVEN: all 177 combining/math target spans in the five build docs translate + compile with ZERO notdef under the pinned typst package"
    status: "IN-PLACE CORPUS MIGRATION APPLICATION IS THE REVIEWED CONTINUATION. R7C delivered the parity decision, the complete inventory, the proven tool, and the probe-1 gate; applying it in place (inline spans + indented display blocks + per-formula fresh-Fable review + byte-repro across the two large docs) is deferred. The notdef pins below remain tracked by validate_pdf_math until a document is migrated."
    notdef_source: "confirmed exactly the U+20D7 (vec) occurrences: 13 in the core (-> 26 NUL), 3 in the manuscript (-> 6 NUL); companions/note have 0"
combining_accent_ban: "Publication math source must use \\hat/\\bar/\\vec, never precomposed combining marks (U+0300-U+036F, U+20D7). validate_math_source.py enforces this inside $...$ / $$...$$ / ```math."
documents:
- pdf: notation-gallery
  role: reference
  sources: [docs/notation-gallery.md]
  migrated: true
  expected_notdef: 0
- pdf: orthemic-core-reference-draft
  role: corpus
  sources: [theory/orthemic-core-formalization.md, theory/orthemic-multi-actor-conflict-note.md]
  migrated: false
  known_notdef: 26
  notdef_cause: "combining arrow U+20D7 over mu / C (episode-signature vec-mu, vec-C) rendered under #raw monospace"
- pdf: orthemma-ortheme-systems-draft
  role: corpus
  sources: [manuscript/orthemma-ortheme-systems-revised-draft.md]
  migrated: false
  known_notdef: 6
  notdef_cause: "combining-mark math notation rendered under #raw monospace"
- pdf: orthability-ground-of-intelligibility-draft
  role: corpus
  sources: [companion/orthability-and-the-ground-of-intelligibility.md]
  migrated: false
  known_notdef: 0
- pdf: orthability-divine-speech-athari-draft
  role: corpus
  sources: [companion/orthability-divine-attributes-and-speech-athari.md]
  migrated: false
  known_notdef: 0
