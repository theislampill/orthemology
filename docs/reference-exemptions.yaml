schema: orthemology-reference-exemptions-v1
note: >-
  Declared exemptions for scripts/validate_internal_references.py, which fails when a
  document cites a repository path that does not exist. That checker exists because of R4
  finding §4: Decision 0011, the companion, and the correction ledger all cited fixture
  CR-9, an example file, and a validator that were never in the tree, and nothing caught
  it — false closure inside a project about false closure. Every entry below must state
  WHY the path does not resolve; "it is broken" is not a reason.
external_paths:
  note: >-
    Paths belonging to ANOTHER repository, cited as the provenance of a bounded import.
    They are not expected to resolve here and no claim of this corpus depends on reading
    them. The import-mapping document states its own boundary (no content or theology was
    merged from that repository).
  owner_repository: daee-epistemics
  note_r7: >-
    R7 (Decision 0021) added the typed daee crosswalk under applications/daee-epistemics/,
    which cites more foreign daee paths (pinned commit c86b3c66...). These are that
    repository's paths under its atomics/skill/references/ tree; the internal-reference
    regex extracts the references/... tail, which cannot and should not resolve locally.
  paths:
  - references/diagnostics/diagnostic-ir.md
  - references/diagnostics/recursive-state-transitions.md
  - references/rubrics/diagnostic-render-contract.md
  - references/diagnostics/inference-boundary.md
  - references/diagnostics/noetic-reading-checklist.md
  - references/diagnostics/pattern-profiling.md
  - references/diagnostics/proof-method-audit.md
  - references/diagnostics/routing-precedence.md
  - references/diagnostics/seven-deformations.md
  - references/rubrics/output-release.md
retired_paths:
  note: >-
    Paths that DID exist and were deliberately retired. Historical decision bodies are
    preserved verbatim (the project never rewrites history to make the present look
    cleaner), so their original text still names the retired path; the dated amendment on
    the same document records the retirement. A retired path must name its successor.
  paths:
  - path: references/latent-state-additions.bib
    retired: 2026-07-20
    retired_by: R4 independent review (Phase E)
    successor: references/orthemology.bib
    reason: >-
      An orphan bibliography fragment is invisible to the citation validators, which is how
      the three latent-state sources became unreferenced by CI. The entries were merged into
      the main database and the fragment deleted; scripts/validate_claim_sources.py now fails
      on any stray .bib. Decision 0015's preserved body still names the fragment; its
      Amendment A2 records the merge.
