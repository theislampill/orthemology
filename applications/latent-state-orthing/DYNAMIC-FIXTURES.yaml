schema: orthemology-dynamic-fixtures-v1
# R7B, Decision 0024. Fixtures asserting the dynamic-orthing separations. Each
# states a scenario, the distinction it protects, the collapse it forbids, and a
# non-claim. scripts/validate_dynamic_orthing.py enforces structure + invariants.
# Deterministic; establishes no empirical, human, or metaphysical claim.
update_levels: [episode-inference, representation-learning, repertoire-revision, analysis-version-change]
fixtures:
- id: DYN-1
  name: episode inference is not model learning
  level: episode-inference
  scenario: "Within a fixed analysis A and model theta, new evidence in one episode revises belief b_t -> b_{t+1} and the inferred profile p-hat_t -> p-hat_{t+1}."
  distinction: "a within-episode belief update is NOT a change to theta or to the repertoire O_A"
  forbids: "recording a belief revision as if the model or repertoire had been revised"
  non_claim: "belief is not ground truth O*(m;A); no interior/soul access"
- id: DYN-2
  name: world transition vs learner update
  level: representation-learning
  scenario: "An action a_t yields a successor occurrence m_{t+1}; separately a learning update U_A(e_t) changes theta_t -> theta_{t+1}."
  distinction: "the occurrence/world edge m_t --a_t--> m_{t+1} is not the learner edge theta_t --U_A--> theta_{t+1}"
  forbids: "attributing a model change to the world, or a world change to the model"
  non_claim: "neither edge asserts anything about a person's interior"
- id: DYN-3
  name: analysis-version change blocks transport
  level: analysis-version-change
  scenario: "A change in task/tolerance/boundaries/representation family/governance yields A_t -> A_{t+1}."
  distinction: "placements, validations, and verdicts under A_t do NOT transport to A_{t+1} without a declared transport argument"
  forbids: "carrying a verdict across an analysis-version change as if invariant"
  non_claim: "analysis relativity is not relativism; O*(m;A) is objective once A is fixed"
- id: DYN-4
  name: ortheme admission is by ablation, not latent split
  level: representation-learning
  scenario: "A model acquires a new latent-state distinction during learning."
  distinction: "the split becomes orthemically consequential ONLY if a declared merge/ablation test shows collapsing it changes warranted prediction/action/route/validation/closure/loss beyond epsilon_A"
  forbids: "promoting a latent split to an ortheme merely because the model represents it"
  non_claim: "an overcomplete model can invent splits; representation is not truth"
- id: DYN-5
  name: no one-to-one latent-to-profile map
  level: representation-learning
  scenario: "Comparing latent states Z_A with the profile space Pi_A."
  distinction: "one latent state may encode a whole profile; several latent states may share one profile; one orthemic distinction may be distributed over many model dimensions"
  forbids: "assuming a bijection between latent states and orthemic profiles"
  non_claim: "no claim that the model's dimensions are the world's distinctions"
- id: DYN-6
  name: orthogonalization is one geometry
  level: representation-learning
  scenario: "Decorrelation produces near-orthogonal representations (OSM)."
  distinction: "orthogonality is one implementation geometry; it does not define an ortheme"
  forbids: "defining orthemes, pathway adequacy, or strict soundness via vector orthogonality"
  non_claim: "orthogonalization is neither necessary nor sufficient for distinct orthemes"
- id: DYN-7
  name: endpoint underdetermines mechanism
  level: representation-learning
  scenario: "Several tested settings satisfy a declared similar-final-representational-structure criterion; among the tested models under the reported evaluation, only CSCG consistently matches the reported decorrelation order."
  distinction: "similar endpoint geometry is not exact representation or parameter identity and does not identify the mechanism; trajectory evidence is a separate constraint"
  forbids: "inferring the learning mechanism from endpoint performance alone"
  non_claim: "this constrains a dynamic account; it does not validate Orthemology"
- id: DYN-9
  name: repertoire revision changes what exists, under governance
  level: repertoire-revision
  scenario: "A recurring error across episodes triggers a governed revision changing the metaortheme set mu_t -> mu_{t+1} or the repertoire O_{A,t} -> O_{A,t+1}."
  distinction: "repertoire revision is neither a within-episode belief update (DYN-1) nor a model-parameter change (DYN-2); it changes WHICH metaorthemes/routes exist"
  forbids: "adding or retiring a metaortheme/route without a governed, provenance-tracked revision record"
  non_claim: "revision is governed and recorded, not automatic learning; it asserts nothing about any interior state"
- id: DYN-8
  name: OSM is exemplification and constraint, not validation
  level: analysis-version-change
  scenario: "Using the OSM/CSCG source in the dynamic extension."
  distinction: "the source supplies an independent example and constraints a dynamic account must represent; it is NOT evidence for the theory"
  forbids: "citing OSM as support for Orthemology, its terminology, human noetics, fitrah, or any metaphysical claim; importing any biological/wet-lab procedure"
  non_claim: "no human/noetic/metaphysical transfer whatsoever"
# R7C (audit B7 E7): failure families the dynamic account must represent.
- id: DYN-10
  name: latent-label permutation
  level: representation-learning
  scenario: "The latent-state / clone labels are permuted."
  distinction: "relabeling latent states changes no warranted prediction/action/route/validation/closure — labels are permutation-arbitrary"
  forbids: "treating a latent label as an ortheme identity"
  non_claim: "clone labels carry no orthemic identity"
- id: DYN-11
  name: overcomplete spurious split
  level: representation-learning
  scenario: "An overcomplete model invents a latent split with no ablation consequence."
  distinction: "a split with zero merge/ablation consequence (Delta^merge <= epsilon_A) is NOT orthemically consequential"
  forbids: "promoting a spurious split to an ortheme"
  non_claim: "representation capacity is not truth"
- id: DYN-12
  name: underfit merge (hidden consequential distinction)
  level: representation-learning
  scenario: "An underfit model merges two states whose separation matters."
  distinction: "an underfit model can hide a consequential distinction (Delta^merge > epsilon_A); absence in the model is not absence in the world"
  forbids: "concluding no distinction exists because the model lacks it"
  non_claim: "model silence is not worldly identity"
- id: DYN-13
  name: out-of-distribution failure
  level: representation-learning
  scenario: "Input falls outside the training/analysis distribution."
  distinction: "OOD inputs make the model unreliable; the runtime must flag/hold, not assert a placement"
  forbids: "asserting a confident placement on OOD input"
  non_claim: "no interior claim; unreliability is disclosed, not hidden"
- id: DYN-14
  name: nonstationary observation/emission map
  level: analysis-version-change
  scenario: "The observation map Omega (or emission model) changes over time."
  distinction: "a changed Omega/emission is an analysis or model change; prior placements do not transport without a declared transport argument"
  forbids: "silently transporting placements across a changed observation map"
  non_claim: "no claim survives a silent map change"
- id: DYN-15
  name: catastrophic forgetting
  level: representation-learning
  scenario: "A model update degrades previously-adequate competence."
  distinction: "a learning update can lose prior competence; it must be DETECTED and recorded, and may trigger rollback"
  forbids: "assuming a model update is monotone improvement"
  non_claim: "learning is not guaranteed improvement"
- id: DYN-16
  name: similar endpoint criterion, different trajectory
  level: representation-learning
  scenario: "Two models satisfy the same declared endpoint criterion via different trajectories."
  distinction: "criterion-level endpoint similarity underdetermines mechanism and parameter identity; trajectory evidence remains separate (echoes DYN-7)"
  forbids: "inferring mechanism from endpoint alone"
  non_claim: "endpoint-criterion match is not representation, parameter, trajectory, or mechanism identity"
- id: DYN-17
  name: model update without profile change
  level: representation-learning
  scenario: "theta_t -> theta_{t+1} occurs but the warranted orthemic profile is unchanged."
  distinction: "a model change need not change p-hat; representation learning is not episode inference"
  forbids: "recording a model update as a placement change"
  non_claim: "theta change is not p-hat change"
- id: DYN-18
  name: profile change without model update
  level: episode-inference
  scenario: "New evidence revises p-hat within a fixed theta and A."
  distinction: "belief/profile can change with no model update; episode inference is not representation learning"
  forbids: "recording a belief update as a model change"
  non_claim: "p-hat change is not theta change"
- id: DYN-19
  name: analysis drift vs model drift
  level: analysis-version-change
  scenario: "A change could be an analysis-version change or a model update."
  distinction: "A_t -> A_{t+1} (task/tolerance/boundaries/governance) is distinct from theta_t -> theta_{t+1}; they are governed differently and block transport differently"
  forbids: "conflating an analysis-version change with a model update"
  non_claim: "no transport across an unacknowledged analysis change"
- id: DYN-20
  name: hysteresis and rollback
  level: repertoire-revision
  scenario: "A governed repertoire revision is later rolled back."
  distinction: "revisions are path-dependent and may be rolled back; the transport/reopening record must support rollback"
  forbids: "treating a revision as irreversible or forgetting its provenance"
  non_claim: "revision history is retained; rollback asserts nothing about any interior state"
- id: DYN-21
  name: CSCG fit refinement and decode remain separate
  level: representation-learning
  scenario: "The reported CSCG pipeline uses Baum-Welch expectation-maximization likelihood fit, then Viterbi training for transition refinement; the pinned official code separately performs max-product/backtrace MAP decode."
  distinction: "fit, refinement, and decode are three typed roles with article-text versus pinned-code evidence kept explicit"
  forbids: "using Viterbi as the sole or primary fit; collapsing Viterbi refinement with Baum-Welch or MAP decode; rejecting the literal phrase Viterbi training"
  non_claim: "the code-dependent MAP operation is not attributed to the article-text extraction"
- id: DYN-22
  name: reported neural-network method loci remain typed
  level: representation-learning
  scenario: "For the reported vanilla RNNs BPTT computes gradients, Adam updates parameters, and cross-entropy is the objective; Adam and cross-entropy also occur at the reported LSTM and transformer loci, while the Hebbian RNN uses a distinct local timing update."
  distinction: "gradient computation, optimizer, objective, and local learning rule are different method roles"
  forbids: "BPTT-as-optimizer, Adam-as-loss, omitted cross-entropy, or all-compared-methods-as-gradient"
  non_claim: "method-role separation supplies no cross-model mechanism identity or broad optimization claim"
- id: DYN-23
  name: high performance without measured global geometry
  level: representation-learning
  scenario: "Reported ReLU and sigmoid RNN, LSTM, and transformer controls achieve high prediction performance without the measured global orthogonalized geometry."
  distinction: "task performance, endpoint geometry, trajectory match, adaptation, and mechanism are separate result fields"
  forbids: "claiming that CSCG-like global geometry is necessary for task performance, correctness, learning, or generalization"
  non_claim: "a high-performing nonorthogonal control does not validate Orthemology or settle its mechanism"
- id: DYN-24
  name: bounded biological adaptation with model response held
  level: analysis-version-change
  scenario: "The source reports CA1 reuse or adaptation under novel indicator cues and stretched track segments; new-state creation and observation rebinding remain alternatives, and computational-model response is future work."
  distinction: "reported biological adaptation is not model transport and does not choose one latent-state interpretation"
  forbids: "promotion to correctness, convergence, broad generalization, forced new-state creation, or computational-model transport"
  non_claim: "no human/noetic/metaphysical transfer and no biological or wet-lab procedure import"
