# Typed, two-way, read-only crosswalk: daee-epistemics <-> Orthemology (Decision 0021).
# STATUS LAYERS (every row's `status_layer`):
#   direct-repository-description  = what the pinned daee source explicitly says
#   orthemological-crosswalk       = this project's typed interpretation
#   creed-internal-normative       = a claim the daee analysis presupposes (Athari/Taymiyyan)
#   empirical                      = currently NONE
# This file makes NO empirical or theological claim and does not validate daee's premises.
schema: orthemology-daee-crosswalk-v1
daee_repository: theislampill/daee-epistemics
daee_pinned_commit: c86b3c6673147b8802fe222373a165a37d4d24a8
daee_pinned_date: 2026-06-18
review_mode: read-only (repository not modified, not merged, not imported wholesale)
mapping_types: [exact-structural-analogue, partial-analogue, one-to-many, many-to-one, application-extension, no-mapping]

# ---- the mandatory typed distinctions (Decision 0021 §3): none collapses into another ----
typed_distinctions:
- concrete engagement occurrence (this objection/utterance/document, now)
- public discourse observation (wording, context, source markers, interaction history)
- candidate noetic profiles (the several underlying conditions the discourse is consistent with)
- inferred noetic profile / Psi-I (the system's current read, under uncertainty)
- actual interior condition (the person's real noetic state; NOT available to the system)
- governing noetic metaorthemes (repeatable rules over source order, proof method, predication, warrant, claim level, closure)
- case-bound metaorthemmata (this case's selected modules, rule versions, source statuses, thresholds, scopes, evidence bindings)
- Diagnostic IR (episode-internal control representation; composite, not one metaorthemma, not ground truth)
- selected policy / TTP (the action/route chosen at a locus)
- orthing episode (the whole intake -> diagnosis -> route -> response -> reread run)
- agent-runtime closure / Psi-N (closure of the executor's own field; NOT the person's restoration)
- rendered language action (the released response)
- actual uptake / restoration (whether the person accepted or was restored; NOT claimed)

rows:
- daee: engagement/objection/utterance intake
  daee_source: README.md; atomics/skill/references/diagnostics/diagnostic-ir.md
  daee_role: the concrete thing being engaged at this moment
  orthemology_object: immediate orthemma (concrete situated case, identity key + version)
  mapping_type: exact-structural-analogue
  analysis_level: token
  status_layer: orthemological-crosswalk
  non_claims: [the orthemma is the case, not the person's soul-state]
  notation_collision: none

- daee: public wording, context, source markers, interaction history
  daee_source: atomics/skill/references/diagnostics/diagnostic-ir.md; inference-boundary.md
  daee_role: the observable surface the diagnosis reads
  orthemology_object: observation / typed evidence over the orthemma (not the whole case)
  mapping_type: exact-structural-analogue
  analysis_level: token
  status_layer: orthemological-crosswalk
  non_claims: [surface discourse is an observation, never the interior state itself]
  notation_collision: none

- daee: Psi-I (inferred interlocutor field), selected/held noetic frames, deformation/concealment reads
  daee_source: atomics/skill/references/diagnostics/recursive-state-transitions.md; inference-boundary.md
  daee_role: the system's current read of the interlocutor's condition, under uncertainty
  orthemology_object: inferred candidate profile p-hat / candidate set C-hat over a noetic profile space
  mapping_type: partial-analogue
  analysis_level: token
  status_layer: orthemological-crosswalk
  non_claims: [Psi-I is NOT O*(m;A) by assertion; NOT direct soul access; NOT ground truth]
  notation_collision: "D.N_frame (daee N = selected/held frame) has no single Orthemology equivalent — do not map to one object"

- daee: the person's actual noetic condition (where included in the target at all)
  daee_source: inference-boundary.md (explicit non-isomorphism / no soul access)
  daee_role: the real interior state
  orthemology_object: worldly target state O*(m;A) region — NOT directly available to the system
  mapping_type: partial-analogue
  analysis_level: worldly
  status_layer: orthemological-crosswalk
  non_claims: [never asserted from thin discourse evidence; the system reads observations, not interiors]
  notation_collision: none

- daee: deformation types (hawa, taqlid, ada, gharad, shubhah, ...)
  daee_source: atomics/skill/references/diagnostics/seven-deformations.md; modes-of-concealment.md
