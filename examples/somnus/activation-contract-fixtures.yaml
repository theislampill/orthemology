schema: orthemology-activation-contract-fixtures-v1
evaluators:
- evaluator_id: property-boundary-evaluator
  evaluator_version: 1.0.0
  result_vocabulary: [applicable, inapplicable, indeterminate]
  non_claims:
  - indicators are evidence about required properties, not the boundary itself
authoring_records:
- provenance_record_id: BOOTSTRAP-AUTHORING-001
  capture_mode: bootstrap_provenance
  immutable: true
  boundary_problem: distinguish theological propositions and worldview-bearing tasks from lexical near-boundary uses
  selected_contract_ref: theological-claimant-activation@1.0.0
  fixture_ids: [ACT-POS-001, ACT-NEG-001, ACT-MIXED-LEXICAL-001, ACT-OVERLAP-001]
  unresolved_residuals: [mixed-domain overlap remains conflict-bearing]
- provenance_record_id: BOOTSTRAP-AUTHORING-002
  capture_mode: bootstrap_provenance
  immutable: true
  boundary_problem: distinguish requested data-model operations from schema language used outside a data operation
  selected_contract_ref: database-schema-activation@1.0.0
  fixture_ids: [ACT-DB-POS-001, ACT-DB-NEG-001, ACT-DB-INDETERMINATE-001, ACT-OVERLAP-001]
  unresolved_residuals: [mixed-domain overlap remains conflict-bearing]
- provenance_record_id: BOOTSTRAP-AUTHORING-003
  capture_mode: bootstrap_provenance
  immutable: true
  boundary_problem: determine whether preserved records support a bounded residual-recurrence assessment
  selected_contract_ref: recurrence-meta-assessability@1.0.0
  fixture_ids: [ACT-REC-POS-001, ACT-REC-NEG-001, ACT-REC-INDETERMINATE-001, ACT-REC-OVERLAP-001]
  unresolved_residuals: [assessability does not establish recurrence cause or remedy]
contracts:
- contract_id: theological-claimant-activation
  contract_version: 1.0.0
  claimant_id: theological-claimant
  claimant_version: 1.0.0
  required_properties: [theological-proposition, worldview-bearing-task]
  positive_indicators: [tawhid, divine-unity]
  exclusion_indicators: [database-column-only, quoted-token-only]
  boundary_counterexamples: [tawhid-column-name, quoted-term-without-theological-claim]
  tolerated_ambiguity: mixed-domain tasks remain indeterminate until the proposition and requested operation are separated
  fallback_claimants: [baseline-reasoning, database-schema-claimant]
  no_claim_allowed: true
  decision_policy: applicable only when every required property is satisfied and no controlling exclusion applies
  indeterminate_policy: retain the attempt and permit another applicable claimant or the declared baseline rule
  fixture_suite: examples/somnus/activation-contract-fixtures.yaml
  effective: {from_revision: task4-fixture-v1, through_revision: null}
  supersedes: null
  superseded_by: null
  authorship: {mode: bootstrap_provenance, provenance_record_id: BOOTSTRAP-AUTHORING-001}
  status: accepted
  fixture_outcomes: [ACT-POS-001, ACT-NEG-001, ACT-MIXED-LEXICAL-001, ACT-OVERLAP-001]
- contract_id: database-schema-activation
  contract_version: 1.0.0
  claimant_id: database-schema-claimant
  claimant_version: 1.0.0
  required_properties: [data-model-operation]
  positive_indicators: [database, column, schema]
  exclusion_indicators: [theology-only]
  boundary_counterexamples: [theological-proposition-without-data-operation]
  tolerated_ambiguity: mixed-domain tasks may overlap with another applicable claimant
  fallback_claimants: [baseline-reasoning]
  no_claim_allowed: true
  decision_policy: applicable when a data-model operation is present
  indeterminate_policy: retain the attempt and defer or route through another applicable claimant
  fixture_suite: examples/somnus/activation-contract-fixtures.yaml
  effective: {from_revision: task4-fixture-v1, through_revision: null}
  supersedes: null
  superseded_by: null
  authorship: {mode: bootstrap_provenance, provenance_record_id: BOOTSTRAP-AUTHORING-002}
  status: accepted
  fixture_outcomes: [ACT-DB-POS-001, ACT-DB-NEG-001, ACT-DB-INDETERMINATE-001, ACT-OVERLAP-001]
- contract_id: recurrence-meta-assessability
  contract_version: 1.0.0
  claimant_id: residual-recurrence-standard
  claimant_version: 1.0.0
  required_properties: [preserved-target, sufficient-residual-structure]
  positive_indicators: [controlled-fingerprint, immutable-target-record]
  exclusion_indicators: [mutable-target-history, missing-target-record]
  boundary_counterexamples: [free-text-similarity-without-preserved-target, copied-residual-without-distinct-orthing]
  tolerated_ambiguity: incomplete residual structure remains indeterminate or record-insufficient
  fallback_claimants: [historical-record-audit, no-retrospective-assessment]
  no_claim_allowed: true
  decision_policy: applicable only when the target is preserved and the record contains sufficient controlled residual structure
  indeterminate_policy: preserve the target and emit no assessment when applicability or record sufficiency is unresolved
  fixture_suite: examples/somnus/activation-contract-fixtures.yaml
  effective: {from_revision: task4-fixture-v1, through_revision: null}
  supersedes: null
  superseded_by: null
