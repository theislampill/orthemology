               delta: control-state change, terminal_posture: CLOSURE, reread: {performed: false, outcome: skipped},
               verdicts: {runtime_closure: true, strictly_sound: not-claimed}, hard_constraints: [],
               non_claims: [runtime closure is not human restoration]}
- id: CT5
  distinction: runtime closure asserted as human restoration
  expected_valid: false
  violates: closure-as-restoration
  transition: {selected_route: route-clarify, eligible_routes: [route-clarify], ranking_witness: order,
               delta: control-state change, terminal_posture: CLOSURE, reread: {performed: true, outcome: ok},
               verdicts: {runtime_closure: true, strictly_sound: not-claimed}, hard_constraints: [],
               non_claims: [the subject was restored]}
- id: CT6
  distinction: burden deletion as progress
  expected_valid: false
  violates: burden-deletion
  transition: {selected_route: route-clarify, eligible_routes: [route-clarify], ranking_witness: order,
               delta: "deleted the residual dependency burden to reach closure", terminal_posture: CLOSURE,
               reread: {performed: true, outcome: ok}, verdicts: {runtime_closure: true, strictly_sound: not-claimed},
               hard_constraints: [no burden deletion], non_claims: [runtime closure is not human restoration]}
- id: CT7
