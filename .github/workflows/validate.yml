name: validate
on:
  push:
  pull_request:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Repository hygiene + honesty checks
        run: python scripts/validate_repo.py
      - name: Verdict semantics fixtures
        run: python scripts/validate_verdict_semantics.py --fixtures tests/verdict-fixtures.json
