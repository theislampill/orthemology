# Corrective-transition fixtures (R7D, Decision 0033, audit B28/B29, phase-H6 probes).
# Each fixture is run through scripts/validate_corrective_transition.py's transition_ok
# gate. Invalid fixtures name the `violates` rule. No fixture asserts a soul-state.
schema: orthemology-corrective-transition-fixtures-v1
fixtures:
- id: CT1
  distinction: hard-constraint-violating route ranked as an improvement
  expected_valid: false
  violates: route-not-admissible
  transition: {selected_route: route-delete-burden, eligible_routes: [route-clarify], ranking_witness: order,
               delta: control-state change, terminal_posture: HOLD, reread: {performed: true, outcome: ok},
               verdicts: {runtime_closure: false, strictly_sound: not-claimed}, hard_constraints: [no burden deletion],
               non_claims: [no soul access]}
- id: CT2
  distinction: route selected without a ranking witness
  expected_valid: false
  violates: no-ranking-witness
  transition: {selected_route: route-clarify, eligible_routes: [route-clarify], ranking_witness: "",
               delta: control-state change, terminal_posture: HOLD, reread: {performed: true, outcome: ok},
               verdicts: {runtime_closure: false, strictly_sound: not-claimed}, hard_constraints: [], non_claims: [no soul access]}
- id: CT3
  distinction: delta conflated with correctness (strict soundness asserted of a runtime transition)
  expected_valid: false
  violates: delta-as-soundness
  transition: {selected_route: route-clarify, eligible_routes: [route-clarify], ranking_witness: order,
               delta: control-state change, terminal_posture: HOLD, reread: {performed: true, outcome: ok},
               verdicts: {runtime_closure: false, strictly_sound: true}, hard_constraints: [], non_claims: [no soul access]}
- id: CT4
