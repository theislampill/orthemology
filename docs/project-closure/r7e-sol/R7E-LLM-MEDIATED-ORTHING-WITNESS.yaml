schema: orthemology-llm-mediated-orthing-witness-v1
status: current-candidate
witness_id: R7E-LLM-WITNESS-001
declared_analysis:
  analysis_id: A-R7E-LLM-WITNESS
  scope: retrospective classification of repository-preserved R7E evidence
  evidence_refs: [E-R7E-STATE, E-R7E-PROVENANCE]
classifications:
  llm_applicability: supported
  llm_mediated_realizability: partially-supported
  comparative_utility: not-established
original_history:
  capture_mode: retrospective_reconstruction
  episode_cardinality: underdetermined
  authoritative_identity_evidence_refs: []
  original_t1_checkpoint_status: missing
  original_t1_evidence_status: not-observed
identity_records:
  - {identity_kind: turn, status: unknown, identifier: null}
  - {identity_kind: session, status: unresolved, identifier: null}
  - {identity_kind: episode, status: underdetermined, identifier: null}
  - {identity_kind: occurrence, status: unresolved, identifier: null}
  - {identity_kind: orthing, status: unresolved, identifier: null}
  - {identity_kind: reconstruction_event, status: reconstruction-only, identifier: EV-R7E-RETRO-001}
evidence_registry:
  - evidence_id: E-R7E-STATE
    source_ref: docs/project-closure/r7e/AUTONOMOUS-R7E-STATE.json
    state: repository-verified
    claim_boundary: file identity only; workflow claims remain attributed
  - evidence_id: E-R7E-PROVENANCE
    source_ref: docs/project-closure/r7e-sol/R7E-INPUT-PROVENANCE.json
    state: repository-verified
    claim_boundary: current provenance accounting only
  - evidence_id: E-WORKFLOW-JOURNAL
    source_ref: workflow journal
    state: missing
    claim_boundary: no original event or checkpoint reconstruction
  - evidence_id: E-PER-AGENT-REPORTS
    source_ref: per-agent reports
    state: missing
    claim_boundary: no independent role reconstruction
  - evidence_id: E-FULL-DRAFTS
    source_ref: full candidate drafts
    state: missing
    claim_boundary: no complete candidate reconstruction
  - evidence_id: E-REJECTIONS-PRESERVED
    source_ref: eight repository rejection bullets
    state: repository-verified
    claim_boundary: preserved records only
  - evidence_id: E-REJECTIONS-MISSING
    source_ref: eight reported rejection records
    state: missing
    claim_boundary: absent records are not inferred
  - evidence_id: E-ATTACHMENTS
    source_ref: supplied R7E attachments
    state: attachment-observed
    claim_boundary: original-run binding unresolved
  - evidence_id: E-AGGREGATE-STATISTICS
    source_ref: R7E implementing-run aggregate statistics
    state: implementing-run-attributed
    claim_boundary: not repository fact or independent reconstruction
  - evidence_id: E-SOL-REVIEW
    source_ref: docs/project-closure/r7e-sol/R7E-INDEPENDENT-FINDING-MATRIX.yaml
    state: repository-verified
    claim_boundary: later review evidence only
witness_objects:
  - object_id: WO-ORTHEMMATA
    object_kind: orthemmata
    illustration_role: retrospective-reconstruction
    evidence_refs: [E-R7E-STATE]
    description: The preserved repository sources bound the reconstructed cases without supplying original target identities.
  - object_id: WO-ANALYSIS
    object_kind: declared-analysis
    illustration_role: schema-conformant-illustrative-mapping
    evidence_refs: [E-R7E-PROVENANCE]
    description: The present analysis is a later classification owner, not an original runtime record.
  - object_id: WO-ROLES
    object_kind: executor-subagent-roles
    illustration_role: documented-historical-fact
    evidence_refs: [E-R7E-STATE, E-AGGREGATE-STATISTICS]
    description: The repository preserves an LLM-mediated orchestration account while its aggregate details remain attributed.
  - object_id: WO-GOVERNING
    object_kind: governing-types
    illustration_role: schema-conformant-illustrative-mapping
    evidence_refs: [E-R7E-PROVENANCE]
    description: Existing episode, evidence, route, verdict, and governance types supply a bounded retrospective mapping.
  - object_id: WO-BINDINGS
    object_kind: case-bound-applications
    illustration_role: unsupported-live-runtime-claim
    evidence_refs: [E-WORKFLOW-JOURNAL]
    description: Original case-bound runtime bindings are not observed.
  - object_id: WO-SOURCES
    object_kind: sources
    illustration_role: documented-historical-fact
    evidence_refs: [E-R7E-STATE, E-R7E-PROVENANCE]
    description: Repository source identities and current provenance accounting are documented.
  - object_id: WO-CANDIDATES
    object_kind: candidate-findings-profiles
    illustration_role: retrospective-reconstruction
    evidence_refs: [E-FULL-DRAFTS, E-REJECTIONS-PRESERVED, E-REJECTIONS-MISSING]
    description: Occurrence-level remnants are reconstructible, while complete drafts and rejection records are not.
  - object_id: WO-ROUTES
    object_kind: routes
    illustration_role: retrospective-reconstruction
    evidence_refs: [E-R7E-STATE, E-WORKFLOW-JOURNAL]
    description: Phase-level routing is reported, but original event-level routes are unavailable.
  - object_id: WO-ACTIONS
    object_kind: integrated-actions
    illustration_role: documented-historical-fact
    evidence_refs: [E-R7E-STATE, E-SOL-REVIEW]
    description: Repository diffs document integrated candidate actions without establishing correctness.
  - object_id: WO-RESIDUAL
    object_kind: residual-backlog
    illustration_role: documented-historical-fact
    evidence_refs: [E-R7E-PROVENANCE]
    description: The current provenance ledger documents unresolved residuals and duplicate historical IDs.
  - object_id: WO-SUCCESSOR
    object_kind: successor-state
    illustration_role: documented-historical-fact
    evidence_refs: [E-SOL-REVIEW]
    description: The later repository candidate state is documented without a runtime continuity claim.
  - object_id: WO-AUDIT
    object_kind: higher-order-audit
    illustration_role: retrospective-reconstruction
    evidence_refs: [E-SOL-REVIEW]
    description: The Sol review is a later human and LLM-mediated retrospective assessment.
higher_order_audit:
  audit_id: R7E-SOL-RETRO-AUDIT-001
  subject_witness_id: R7E-LLM-WITNESS-001
  audit_authority_id: R7E-SOL-INDEPENDENT-REVIEW
  implementing_authority_id: R7E-IMPLEMENTING-RUN
  self_certifying: false
  assessment_kind: human-llm-mediated-retrospective-assessment
  meta_orthability_disposition: record-insufficient
  somnic_conformance: not-established
  authoritative_target_identity_status: unresolved
  target_history_checkpoint_status: missing
  target_history_digest_status: not-observed
  original_t1_evidence_refs: []
  later_evidence_refs: [E-SOL-REVIEW]
claim_boundaries:
  correctness: not-established
  empirical_validation: not-established
  terminology_benefit_or_adoption: not-established
  exact_internal_model_ontology: not-established
  cross_model_or_domain_generalization: not-established
  live_append_only_capture: not-observed
  claimant_contract_enforcement: not-observed
  recurrence_detection: not-observed
  idempotent_frontier_processing: not-observed
  full_somnus_writeback_chain: not-implemented
  nightly_autonomy: not-implemented
  runtime_deployment: not-implemented
proof_protocol_placement:
  status: requires-separately-numbered-reviewed-follow-up
  concepts: [PoW, PoR, Proof-of-Orth, capability-grant, execution-receipt]
  implemented: false
  normative_owner_created: false
